<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administración - ShareCode</title>
    
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d30 100%);
            color: #d4d4d4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .card {
            background: #2d2d30;
            border: 1px solid #3e3e42;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            width: 60px;
            height: 60px;
            color: #4ec9b0;
            margin-bottom: 15px;
        }

        .logo h1 {
            font-size: 2em;
            color: #4ec9b0;
            margin-bottom: 10px;
        }

        .logo p {
            color: #969696;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d4d4d4;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 6px;
            color: #d4d4d4;
            font-size: 1em;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4ec9b0;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #4ec9b0;
            color: #1e1e1e;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #5edcc4;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
        }

        .success-message {
            background: rgba(78, 201, 176, 0.1);
            border: 1px solid #4ec9b0;
            color: #4ec9b0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .footer-links a {
            color: #4ec9b0;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #5edcc4;
            text-decoration: underline;
        }

        .admin-info {
            background: rgba(78, 201, 176, 0.05);
            border: 1px solid #3e3e42;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .admin-info p {
            color: #969696;
            font-size: 0.9em;
            margin: 5px 0;
        }

        .admin-info code {
            background: #1e1e1e;
            padding: 2px 6px;
            border-radius: 3px;
            color: #4ec9b0;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <i data-feather="shield"></i>
                <h1>Administración</h1>
                <p>Panel de control de ShareCode</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="admin@sharecode.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password"
                        id="password" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <button type="submit" class="btn">
                    <i data-feather="log-in" style="width: 18px; height: 18px;"></i>
                    Acceder
                </button>
            </form>

            <div class="footer-links">
                <a href="/">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script>
        // Inicializar iconos
        feather.replace();

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('¡Acceso concedido! Redirigiendo...');
                    setTimeout(() => {
                        window.location.href = data.redirect || '/admin';
                    }, 1000);
                } else {
                    showError(data.error || 'Credenciales inválidas');
                }
            } catch (error) {
                showError('Error de conexión. Intenta de nuevo.');
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // Auto-focus en el input
        emailInput.focus();
    </script>
</body>
</html>
